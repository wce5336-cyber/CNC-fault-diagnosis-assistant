# GitHub Actions — offline smoke test (no GPU / LLM required)

name: smoke-test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build processed data
        run: python -m src.process_cnc_datasets

      - name: Build RAG index
        run: python -m src.build_rag_index --reset

      - name: Smoke test
        run: python -m src.smoke_test
